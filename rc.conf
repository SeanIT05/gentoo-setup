# --- Optimized OpenRC Configuration for 16-Thread Workstation ---

# 1. Parallel Boot: Launch services simultaneously across all CPU threads
rc_parallel="YES"
rc_interactive="NO"

# 2. Shell for emergency/maintenance
rc_shell=/sbin/sulogin

# 3. Logging: Disabled to reduce Disk I/O during boot
rc_logger="NO"

# 4. Environment: Standard filtering
#rc_env_allow="VAR1 VAR2"

# 5. Internationalization
unicode="YES"

# 6. TTY Management: Reduced from 12 to 2 (TTY1 and TTY2)
# This prevents wasting time setting up 10 extra unused terminals.
rc_tty_number=2

# 7. Shutdown Speed: Kill hanging services after 10 seconds
rc_send_sighup="YES"
rc_timeout_stopsec="10"
rc_send_sigkill="YES"

# 8. Cgroups: Use hybrid mode (Default for modern Gentoo)
#rc_cgroup_mode="hybrid"
