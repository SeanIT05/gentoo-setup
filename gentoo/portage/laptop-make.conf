COMMON_FLAGS="-march=native -O2 -pipe"
RUSTFLAGS="${RUSTFLAGS} -C target-cpu=native"
# Video cards
VIDEO_CARDS="nvidia"
# Input devices
INPUT_DEVICES="libinput"
# Directories
CONFIG_PROTECT="/var/bind"
PORTAGE_TMPDIR="/var/tmp"
DISTDIR="/var/gentoo/distfiles"
# Locale
LINGUAS="en_US"
L10N="en en-US"
# Portage instructions
EMERGE_DEFAULT_OPTS="--ask --verbose --keep-going --complete-graph=y"
PORTAGE_SCHEDULING_POLICY="idle"
CLEAN_DELAY="3"
MAKEOPTS="-j8"
FEATURES="parallel-install candy compressdebug compress-index parallel-fetch fixlafiles unmerge-orphans noman nodoc noinfo notitles clean-logs"
# CPU
CPU_FLAGS_X86="aes avx avx2 avx_vnni bmi1 bmi2 f16c fma3 mmx mmxext pclmul popcnt rdrand sha sse sse2 sse3 sse4_1 sse4_2 ssse3 vpclmulqdq"
# Flags inheriting COMMON_FLAGS
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"
LDFLAGS="${LDFLAGS}"
# License
ACCEPT_LICENSE="*"
# Global USE flags
USE="alsa asm jit nvenc openmp pipewire threads vdpau X xs
 -bluetooth -cups -geolocation -gnome -gtk -gtk2 -gtk3
 -gtk4 -kde -qt5 -qt6 -systemd -telemetry -wayland -webengine"
# Rolling release
ACCEPT_KEYWORDS="~amd64"
# Grub
GRUB_PLATFORMS="efi-64"
