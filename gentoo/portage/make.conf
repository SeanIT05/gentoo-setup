# ==============================================================================
#  GENTOO CONFIGURATION - i7-10700K (16 Threads) + GTX 1080 Ti
# ==============================================================================

# --- Hardware / Drivers ---
VIDEO_CARDS="nvidia"
INPUT_DEVICES="libinput"
CPU_FLAGS_X86="aes avx avx2 f16c fma3 mmx mmxext pclmul popcnt rdrand sse sse2 sse3 sse4_1 sse4_2 ssse3"

# --- Toolchain & Optimization ---
COMMON_FLAGS="-march=native -O3 -pipe -flto=thin"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# LDFLAGS: Utilizing 'mold' + inheriting COMMON_FLAGS to fix LTO plugin errors.
LDFLAGS="${COMMON_FLAGS} -Wl,--as-needed -fuse-ld=mold"

# Language Specifics (Rust/Go)
RUSTFLAGS="-C debuginfo=0 -C codegen-units=8 -C target-cpu=native -C opt-level=3 -Clinker-plugin-lto -C link-arg=-fuse-ld=mold"
GOFLAGS="-ldflags=-s -ldflags=-w"

# --- Global USE Flags ---
USE="dist-kernel jit lto nvenc pipewire pulseaudio threads vdpau vaapi zstd
     -bluetooth -cups -gnome
     -kde -qt5 -qt6 -systemd -telemetry -wayland -webengine"

# --- Portage Directories (Redirected to Turbo NVMe) ---
PORTAGE_TMPDIR="/mnt/turbo/tmp"
DISTDIR="/mnt/turbo/distfiles"
CONFIG_PROTECT="/var/bind"

# --- Ccache Configuration ---
CCACHE_DIR="/mnt/turbo/ccache"
CCACHE_SIZE="100G"

# --- Portage Behavior & Features ---
MAKEOPTS="-j8"
# Added --with-bdeps=y to keep build-time dependencies updated.
EMERGE_DEFAULT_OPTS="--ask --verbose --keep-going --complete-graph=y --with-bdeps=y"
PORTAGE_SCHEDULING_POLICY="idle"
CLEAN_DELAY="3"
ACCEPT_KEYWORDS="~amd64"
ACCEPT_LICENSE="*"

# Resource Managemen
PORTAGE_NICENESS="15"
PORTAGE_IONICE_COMMAND="ionice -c 3 -p \${PID}"

# Features: Added sandboxing for build security.
FEATURES="parallel-install candy compress-index parallel-fetch fixlafiles unmerge-orphans noinfo notitles clean-logs ipc-sandbox network-sandbox pid-sandbox"
PORTAGE_COMPRESS="zstd"

# --- Logging & Locale ---
PORTAGE_ELOG_CLASSES="log warn error qa info"
PORTAGE_ELOG_SYSTEM="save echo"
PORTAGE_ELOG_COMMAND="echo \"\${PACKAGE} \${MESSAGE}\""

LINGUAS="en_US"
L10N="en en-US"

# --- Bootloader ---
GRUB_PLATFORMS="efi-64"

# --- ZSTD Compression Pipeline ---
PORTAGE_COMPRESS="zstd"
PORTAGE_COMPRESS_FLAGS="-T0 -9"
BINPKG_COMPRESS="zstd"
BINPKG_COMPRESS_FLAGS="-T0 -9"
